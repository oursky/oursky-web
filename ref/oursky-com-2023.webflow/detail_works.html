  <script>
const HKTimezone = "Asia/Hong_Kong"
const LondonTimezone = "Europe/London"
const HKClock = document.getElementById("clock-container--hk")
const LondonClock = document.getElementById("clock-container--london")
function setClock(clockElement, currentDate, timeZone) {
  const dateTimeFormatOptions = {
    hour: "numeric",
    minute: "numeric",
    hour12: true,
    timeZone: timeZone
  };
  const dateTimeFormat = new Intl.DateTimeFormat('en-HK', dateTimeFormatOptions);
  const parts = dateTimeFormat.formatToParts(currentDate);
  const partsMap = {}
  parts.forEach(part => partsMap[part.type] = part.value)
  const minuteHand = clockElement.getElementsByClassName("clock__hand--minute")[0]
  const hourHand = clockElement.getElementsByClassName("clock__hand--hour")[0]
  const timeDisplay = clockElement.getElementsByClassName("clock__time")[0]
  const minutes = partsMap["minute"]
  const hours = partsMap["hour"]
  const dayPeriod = partsMap["dayPeriod"]
  const minutesRatio = parseInt(minutes) / 60
  const hoursRatio = (minutesRatio + parseInt(hours)) / 12
  timeDisplay.innerText = `${hours}:${minutes}${dayPeriod}`
  setRotation(minuteHand, minutesRatio)
  setRotation(hourHand, hoursRatio)
}
function setRotation(element, rotationRatio) {
  element.setAttribute("transform", `rotate(${rotationRatio*360} , 51.6928, 51.0082)`);
}
const currentDate = new Date()
let lastUTCMinutes = currentDate.getUTCMinutes()
setClock(HKClock, currentDate, HKTimezone)
setClock(LondonClock, currentDate, LondonTimezone)
setInterval(() => {
  const currentDate = new Date()
  const currentMinutes = currentDate.getUTCMinutes()
  if(currentMinutes == lastUTCMinutes){
    return;
  }
  lastUTCMinutes = currentMinutes
  setClock(HKClock, currentDate, HKTimezone)
  setClock(LondonClock, currentDate, LondonTimezone)
}, 1000)
</script>
